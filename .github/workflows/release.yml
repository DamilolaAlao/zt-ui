name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  validate-tag:
    name: Validate release tag
    runs-on: ubuntu-latest
    outputs:
      tag: ${{ steps.meta.outputs.tag }}
      version: ${{ steps.meta.outputs.version }}
      image: ${{ steps.meta.outputs.image }}

    steps:
      - name: Validate vYYYY.M.D tag pattern
        id: meta
        env:
          TAG: ${{ github.ref_name }}
          REPOSITORY: ${{ github.repository }}
        run: |
          set -euo pipefail

          if ! printf '%s\n' "$TAG" | grep -Eq '^v[0-9]{4}\.[0-9]{1,2}\.[0-9]{1,2}$'; then
            echo "::error::Release tags must match vYYYY.M.D, for example v2026.4.9."
            exit 1
          fi

          repo_lower="$(printf '%s' "$REPOSITORY" | tr '[:upper:]' '[:lower:]')"

          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"
          echo "image=ghcr.io/$repo_lower" >> "$GITHUB_OUTPUT"

  assets:
    name: Build release assets
    runs-on: ubuntu-latest
    needs: validate-tag
    permissions:
      contents: read

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Run tests
        run: zig build test

      - name: Build release artifacts
        run: zig build -Doptimize=ReleaseSafe

      - name: Package release bundles
        env:
          TAG: ${{ needs.validate-tag.outputs.tag }}
        run: |
          set -euo pipefail

          mkdir -p dist

          web_bundle="zt-ui-${TAG}-web"
          web_stage="dist/$web_bundle"
          mkdir -p "$web_stage"
          cp -R web "$web_stage/"
          cp README.md LICENSE "$web_stage/"
          tar -C dist -czf "dist/${web_bundle}.tar.gz" "$web_bundle"
          (
            cd dist
            zip -qr "${web_bundle}.zip" "$web_bundle"
          )

          linux_bundle="zt-ui-${TAG}-linux-amd64"
          linux_stage="dist/$linux_bundle"
          mkdir -p "$linux_stage/web"
          cp zig-out/bin/zt-ui-serve "$linux_stage/"
          cp -R web/. "$linux_stage/web/"
          cp README.md LICENSE "$linux_stage/"
          tar -C dist -czf "dist/${linux_bundle}.tar.gz" "$linux_bundle"

          (
            cd dist
            sha256sum \
              "${web_bundle}.tar.gz" \
              "${web_bundle}.zip" \
              "${linux_bundle}.tar.gz" \
              > checksums.txt
          )

      - name: Upload packaged assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/*
          if-no-files-found: error

  github-release:
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - assets
    permissions:
      contents: write

    steps:
      - name: Download packaged assets
        uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist

      - name: Create GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-tag.outputs.tag }}
          name: ${{ needs.validate-tag.outputs.tag }}
          generate_release_notes: true
          fail_on_unmatched_files: true
          files: |
            dist/*.tar.gz
            dist/*.zip
            dist/checksums.txt

  ghcr:
    name: Publish GHCR image
    runs-on: ubuntu-latest
    needs:
      - validate-tag
      - assets
    permissions:
      contents: read
      packages: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate container metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ needs.validate-tag.outputs.image }}
          tags: |
            type=raw,value=${{ needs.validate-tag.outputs.tag }}
            type=raw,value=latest
          labels: |
            org.opencontainers.image.title=zt-ui
            org.opencontainers.image.description=Zig immediate-mode dashboard reference
            org.opencontainers.image.version=${{ needs.validate-tag.outputs.tag }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}

      - name: Build and push release image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          provenance: mode=max
          sbom: true
