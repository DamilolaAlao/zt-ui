name: CI

on:
  push:
    branches:
      - main
  pull_request:

jobs:
  zig:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.15.2

      - name: Build tests
        run: zig build test

      - name: Build wasm artifact
        run: zig build
