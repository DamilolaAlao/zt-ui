services:
  zt-ui:
    build:
      context: .
      dockerfile: Dockerfile
    image: zt-ui:local
    container_name: zt-ui
    ports:
      - "8080:8080"
    environment:
      ZT_UI_HOST: 0.0.0.0
      ZT_UI_PORT: "8080"
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid,size=16m
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 64
    restart: unless-stopped
